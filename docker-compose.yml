services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docentes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docentes}
      POSTGRES_DB: ${POSTGRES_DB:-docentesconcausa}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docentes}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-docentes}:${POSTGRES_PASSWORD:-docentes}@db:5432/${POSTGRES_DB:-docentesconcausa}?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NODE_ENV: production
    ports:
      - "3000:3000"
    # Aplica migraciones antes de iniciar el servidor.
    command: sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres_data:
