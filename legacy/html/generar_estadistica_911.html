    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const totalAlumnosInput = document.getElementById('total-alumnos-inicial');
            const ninasInput = document.getElementById('total-ninas-inicial');
            const ninosInput = document.getElementById('total-ninos-inicial');
            const validacionDiv = document.getElementById('validacion-total');

            function validarTotal() {
                const total = parseInt(totalAlumnosInput.value) || 0;
                const ninas = parseInt(ninasInput.value) || 0;
                const ninos = parseInt(ninosInput.value) || 0;
                if (total === 0 && (ninas > 0 || ninos > 0)) {
                    validacionDiv.textContent = '⚠️ El campo "Total de Alumnos" también debe llenarse.';
                    validacionDiv.style.color = 'orange';
                    return;
                };

                if ((ninas + ninos) !== total) {
                    validacionDiv.textContent = '⚠️ La suma de niñas y niños no coincide con el total de alumnos.';
                    validacionDiv.style.color = 'orange';
                } else if (total > 0) {
                    validacionDiv.textContent = '✅ El total coincide.';
                    validacionDiv.style.color = 'var(--color-exito)';
                } else {
                    validacionDiv.textContent = '';
                }
            }
            totalAlumnosInput.addEventListener('input', validarTotal);
            ninasInput.addEventListener('input', validarTotal);
            ninosInput.addEventListener('input', validarTotal);

            const btnAgregarAlumno = document.getElementById('btn-agregar-alumno');
            const tablaBody = document.getElementById('tabla-alumnos-body');
            const btnCalcularEdades = document.getElementById('btn-calcular-edades');
            const fechaCorteInput = document.getElementById('fecha-corte-ciclo');

            btnAgregarAlumno.addEventListener('click', function() {
                const nuevaFila = document.createElement('tr');
                nuevaFila.innerHTML = `
                    <td><input type="text" placeholder="Nombre y apellidos..."></td>
                    <td><input type="date"></td>
                    <td class="edad-calculada">---</td>
                `;
                tablaBody.appendChild(nuevaFila);
            });

            btnCalcularEdades.addEventListener('click', function() {
                const fechaCorteString = fechaCorteInput.value;
                if (!fechaCorteString) {
                    alert('Por favor, selecciona una fecha de corte para poder calcular las edades.');
                    return;
                }
                const fechaCorte = new Date(fechaCorteString + "T00:00:00");

                const filas = tablaBody.getElementsByTagName('tr');
                for (let i = 0; i < filas.length; i++) {
                    const fila = filas[i];
                    const inputFechaNacimiento = fila.querySelector('input[type="date"]');
                    const celdaEdad = fila.querySelector('.edad-calculada');
                    if (inputFechaNacimiento.value) {
                        const fechaNacimiento = new Date(inputFechaNacimiento.value + "T00:00:00");
                        let edad = fechaCorte.getFullYear() - fechaNacimiento.getFullYear();
                        const mesCorte = fechaCorte.getMonth();
                        const mesNacimiento = fechaNacimiento.getMonth();

                        if (mesCorte < mesNacimiento || (mesCorte === mesNacimiento && fechaCorte.getDate() < fechaNacimiento.getDate())) {
                            edad--;
                        }
                        celdaEdad.textContent = edad >= 0 ? edad : "N/A";
                    }
                }
            });
        });
    </script>
